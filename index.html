<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dev">
<meta name="theme-color" content="#1e1e1e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Claude Dev</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #1e1e1e;
  --bg2:       #252526;
  --bg3:       #2d2d30;
  --border:    #3e3e42;
  --text:      #cccccc;
  --text-dim:  #6e6e6e;
  --accent:    #0e7afe;
  --add:       #3fb950;
  --add-bg:    rgba(63,185,80,0.12);
  --del:       #f85149;
  --del-bg:    rgba(248,81,73,0.12);
  --hunk:      #58a6ff;
  --hunk-bg:   rgba(88,166,255,0.08);
  --font:      'SF Mono', Menlo, 'Cascadia Code', 'Fira Code', monospace;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);
  --header-h: 48px;
  --tree-w:   260px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* ===== LAYOUT ===== */

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

/* Header bar */
#header {
  display: flex;
  align-items: center;
  height: var(--header-h);
  min-height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  gap: 4px;
  padding: 0 8px;
  flex-shrink: 0;
}

.hbtn {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  min-width: 44px;
  padding: 0 10px;
  background: none;
  border: none;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  border-radius: 6px;
  -webkit-tap-highlight-color: transparent;
}
.hbtn:active { background: var(--bg3); }
.hbtn.active { color: var(--accent); }

#breadcrumb {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text-dim);
  font-size: 12px;
  padding: 0 4px;
}
#breadcrumb span { color: var(--text); }

/* Main workspace */
#workspace {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* File tree panel */
#tree-panel {
  width: var(--tree-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.2s ease, transform 0.2s ease;
}
#tree-panel.hidden {
  width: 0;
  border-right: none;
}

#tree-header {
  display: flex;
  align-items: center;
  height: 36px;
  padding: 0 6px 0 10px;
  border-bottom: 1px solid var(--border);
  gap: 4px;
  flex-shrink: 0;
}
#tree-header-label {
  flex: 1;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* Path bar below the header */
#tree-path-bar {
  display: flex;
  align-items: center;
  padding: 0 6px 0 8px;
  height: 34px;
  border-bottom: 1px solid var(--border);
  gap: 4px;
  flex-shrink: 0;
  background: var(--bg);
}
#tree-path-display {
  flex: 1;
  font-size: 11px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 4px;
  border: 1px solid transparent;
  direction: rtl;
  text-align: left;
}
#tree-path-display:hover, #tree-path-display:active {
  background: var(--bg3);
  border-color: var(--border);
}
#tree-path-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--accent);
  color: var(--text);
  font-family: var(--font);
  font-size: 11px;
  padding: 4px 6px;
  border-radius: 4px;
  outline: none;
  min-width: 0;
}
.path-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 28px;
  min-width: 28px;
  padding: 0 4px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  border-radius: 4px;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.path-btn:active { background: var(--bg3); color: var(--text); }

#tree-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* Tree nodes */
.tree-node { user-select: none; -webkit-user-select: none; }
.tree-item {
  display: flex;
  align-items: center;
  height: 34px;
  padding-right: 8px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.tree-item:active { background: var(--bg3); }
.tree-item.selected { background: rgba(14,122,254,0.18); }

.tree-indent { flex-shrink: 0; }
.tree-arrow {
  flex-shrink: 0;
  width: 20px;
  text-align: center;
  font-size: 10px;
  color: var(--text-dim);
  transition: transform 0.15s;
}
.tree-arrow.open { transform: rotate(90deg); }
.tree-icon { flex-shrink: 0; margin-right: 5px; font-size: 14px; }
.tree-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 13px;
}
.tree-status {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  margin-left: 4px;
  padding: 1px 4px;
  border-radius: 3px;
}
.tree-status.M { color: #e8bf6a; background: rgba(232,191,106,0.15); }
.tree-status.A { color: var(--add); background: var(--add-bg); }
.tree-status.D { color: var(--del); background: var(--del-bg); }
.tree-status.U { color: var(--text-dim); background: var(--bg3); }

/* Right side: diff + terminal stacked */
#right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Diff / file viewer */
#diff-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 80px;
}

#diff-toolbar {
  display: flex;
  align-items: center;
  height: 36px;
  padding: 0 10px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
  background: var(--bg2);
}
#diff-filename {
  flex: 1;
  font-size: 12px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tbtn {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 28px;
  padding: 0 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  border-radius: 5px;
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  min-width: 44px;
  font-family: var(--font);
}
.tbtn:active { background: var(--border); }
.tbtn.active { background: rgba(14,122,254,0.2); border-color: var(--accent); color: var(--accent); }

#diff-scroll {
  flex: 1;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

#diff-content {
  min-height: 100%;
}

/* Diff lines */
.diff-hunk {
  display: flex;
  align-items: center;
  padding: 2px 12px;
  background: var(--hunk-bg);
  color: var(--hunk);
  font-size: 12px;
  font-style: italic;
  user-select: none;
}
.diff-line {
  display: flex;
  font-size: 12px;
  line-height: 1.6;
}
.diff-line:hover { background: rgba(255,255,255,0.04); }
.diff-line.add { background: var(--add-bg); }
.diff-line.del { background: var(--del-bg); }
.diff-ln {
  flex-shrink: 0;
  width: 42px;
  padding: 0 6px;
  text-align: right;
  color: var(--text-dim);
  font-size: 11px;
  border-right: 1px solid var(--border);
  line-height: 1.6;
  user-select: none;
}
.diff-sign {
  flex-shrink: 0;
  width: 20px;
  text-align: center;
  font-weight: 700;
}
.diff-line.add .diff-sign { color: var(--add); }
.diff-line.del .diff-sign { color: var(--del); }
.diff-code {
  flex: 1;
  padding: 0 8px;
  white-space: pre;
  overflow: visible;
  word-break: break-all;
}

/* Raw file view */
.raw-line {
  display: flex;
  font-size: 12px;
  line-height: 1.6;
}
.raw-line:hover { background: rgba(255,255,255,0.04); }
.raw-ln {
  flex-shrink: 0;
  width: 42px;
  padding: 0 6px;
  text-align: right;
  color: var(--text-dim);
  font-size: 11px;
  border-right: 1px solid var(--border);
  line-height: 1.6;
  user-select: none;
}
.raw-code {
  flex: 1;
  padding: 0 8px;
  white-space: pre;
  overflow: visible;
  word-break: break-all;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  gap: 12px;
  font-size: 13px;
}
.empty-state .icon { font-size: 40px; }

/* Resize handle between diff and terminal */
#resize-handle {
  height: 5px;
  background: var(--border);
  cursor: row-resize;
  flex-shrink: 0;
  position: relative;
  touch-action: none;
}
#resize-handle::after {
  content: '';
  position: absolute;
  inset: -4px 0;
}
#resize-handle:hover, #resize-handle:active { background: var(--accent); }

/* Terminal panel */
#term-panel {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  overflow: hidden;
  transition: height 0.2s ease;
}
#term-panel.collapsed { height: 0 !important; border-top: none; }

#term-toolbar {
  display: flex;
  align-items: center;
  height: 36px;
  padding: 0 10px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  gap: 6px;
  flex-shrink: 0;
}
#term-label {
  flex: 1;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-dim);
}

#term-frame {
  flex: 1;
  border: none;
  background: #000;
  overflow: hidden;
}

/* ===== PORTRAIT OVERLAY (tree as drawer) ===== */
@media (max-width: 600px) {
  #tree-panel {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    z-index: 100;
    width: var(--tree-w) !important;
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    box-shadow: 4px 0 20px rgba(0,0,0,0.5);
  }
  #tree-panel.open {
    transform: translateX(0);
  }
  #tree-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 99;
    background: rgba(0,0,0,0.5);
  }
  #tree-overlay.visible { display: block; }
}

/* ===== LANDSCAPE (tree always visible, side-by-side) ===== */
@media (min-width: 601px) {
  #tree-panel {
    transform: none !important;
  }
  #tree-overlay { display: none !important; }
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* Loading / error states */
.loading-msg {
  padding: 20px;
  color: var(--text-dim);
  text-align: center;
  font-size: 12px;
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button class="hbtn" id="btn-tree" title="Toggle file tree">&#9776;</button>
    <div id="breadcrumb">Select a file</div>
    <button class="hbtn" id="btn-diff" title="Toggle diff/raw view">&#177;</button>
    <button class="hbtn" id="btn-term" title="Toggle terminal">&#62;_</button>
  </div>

  <div id="workspace">
    <!-- Tree overlay for portrait -->
    <div id="tree-overlay"></div>

    <!-- File tree -->
    <div id="tree-panel">
      <div id="tree-header">
        <span id="tree-header-label">Explorer</span>
        <button class="tbtn" id="btn-refresh-tree" title="Refresh">&#8635;</button>
      </div>
      <div id="tree-path-bar">
        <button class="path-btn" id="btn-tree-up" title="Go to parent directory">&#8593;</button>
        <div id="tree-path-display" title="Tap to change directory"></div>
        <input id="tree-path-input" type="text" style="display:none" placeholder="/path/to/project" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="path-btn" id="btn-path-go" style="display:none;color:var(--accent)" title="Navigate">&#9166;</button>
        <button class="path-btn" id="btn-path-cancel" style="display:none" title="Cancel">&#10005;</button>
      </div>
      <div id="tree-scroll">
        <div class="loading-msg">Loading...</div>
      </div>
    </div>

    <!-- Right: diff + terminal -->
    <div id="right-panel">
      <div id="diff-panel">
        <div id="diff-toolbar">
          <span id="diff-filename">No file selected</span>
          <button class="tbtn" id="btn-view-diff" title="Show diff">Diff</button>
          <button class="tbtn" id="btn-view-raw" title="Show raw file">Raw</button>
        </div>
        <div id="diff-scroll">
          <div id="diff-content">
            <div class="empty-state">
              <div class="icon">&#128196;</div>
              <div>Pick a file from the tree</div>
            </div>
          </div>
        </div>
      </div>

      <div id="resize-handle"></div>

      <div id="term-panel">
        <div id="term-toolbar">
          <span id="term-label">Terminal</span>
          <button class="tbtn" id="btn-term-reload" title="Reload terminal">&#8635;</button>
        </div>
        <iframe id="term-frame" src="/terminal/" allowfullscreen></iframe>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
'use strict';

// ===== STATE =====
const state = {
  currentFile: null,
  viewMode: 'diff',   // 'diff' | 'raw'
  treeOpen: false,
  termVisible: true,
  termHeight: 0,
  gitStatuses: {},
  treeRoot: null,
};

// ===== DOM REFS =====
const $ = id => document.getElementById(id);
const btnTree        = $('btn-tree');
const btnDiff        = $('btn-diff');
const btnTerm        = $('btn-term');
const btnViewDiff    = $('btn-view-diff');
const btnViewRaw     = $('btn-view-raw');
const btnRefresh     = $('btn-refresh-tree');
const btnTermReload  = $('btn-term-reload');
const treePanel      = $('tree-panel');
const treeOverlay    = $('tree-overlay');
const treeScroll     = $('tree-scroll');
const diffFilename   = $('diff-filename');
const diffContent    = $('diff-content');
const diffPanel      = $('diff-panel');
const termPanel      = $('term-panel');
const termFrame      = $('term-frame');
const resizeHandle   = $('resize-handle');
const breadcrumb     = $('breadcrumb');
const treePathDisplay = $('tree-path-display');
const treePathInput   = $('tree-path-input');
const btnTreeUp       = $('btn-tree-up');
const btnPathGo       = $('btn-path-go');
const btnPathCancel   = $('btn-path-cancel');

// ===== LAYOUT =====

const PORTRAIT_BREAKPOINT = 600;
const DEFAULT_TERM_HEIGHT_LANDSCAPE = 0.45; // 45% of workspace
const DEFAULT_TERM_HEIGHT_PORTRAIT  = 0.40;

function isPortrait() {
  return window.innerWidth <= PORTRAIT_BREAKPOINT;
}

function applyLayout() {
  const wsHeight = document.getElementById('workspace').clientHeight;
  if (!state.termVisible) {
    termPanel.style.height = '0px';
    termPanel.classList.add('collapsed');
    return;
  }
  termPanel.classList.remove('collapsed');
  if (!state.termHeight) {
    state.termHeight = Math.round(wsHeight * (isPortrait()
      ? DEFAULT_TERM_HEIGHT_PORTRAIT
      : DEFAULT_TERM_HEIGHT_LANDSCAPE));
  }
  const clamped = Math.max(100, Math.min(state.termHeight, wsHeight - 120));
  termPanel.style.height = clamped + 'px';
}

window.addEventListener('resize', applyLayout);
applyLayout();

// ===== TREE TOGGLE =====

function openTree() {
  state.treeOpen = true;
  treePanel.classList.add('open');
  treeOverlay.classList.add('visible');
  btnTree.classList.add('active');
}

function closeTree() {
  state.treeOpen = false;
  treePanel.classList.remove('open');
  treeOverlay.classList.remove('visible');
  btnTree.classList.remove('active');
}

function toggleTree() {
  if (isPortrait()) {
    state.treeOpen ? closeTree() : openTree();
  } else {
    const hidden = treePanel.classList.toggle('hidden');
    btnTree.classList.toggle('active', !hidden);
  }
}

btnTree.addEventListener('click', toggleTree);
treeOverlay.addEventListener('click', closeTree);

// ===== TERMINAL TOGGLE =====

function toggleTerm() {
  state.termVisible = !state.termVisible;
  btnTerm.classList.toggle('active', state.termVisible);
  applyLayout();
}

btnTerm.addEventListener('click', toggleTerm);
btnTerm.classList.add('active');

btnTermReload.addEventListener('click', () => {
  termFrame.src = termFrame.src;
});

// ===== RESIZE HANDLE =====

let resizing = false;
let resizeStartY = 0;
let resizeStartH = 0;

function startResize(clientY) {
  resizing = true;
  resizeStartY = clientY;
  resizeStartH = termPanel.clientHeight;
  document.body.style.userSelect = 'none';
  document.body.style.cursor = 'row-resize';
}
function doResize(clientY) {
  if (!resizing) return;
  const delta = resizeStartY - clientY;
  const wsHeight = document.getElementById('workspace').clientHeight;
  state.termHeight = Math.max(80, Math.min(resizeStartH + delta, wsHeight - 80));
  applyLayout();
}
function endResize() {
  if (!resizing) return;
  resizing = false;
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
}

resizeHandle.addEventListener('mousedown', e => startResize(e.clientY));
document.addEventListener('mousemove', e => doResize(e.clientY));
document.addEventListener('mouseup', endResize);

resizeHandle.addEventListener('touchstart', e => {
  e.preventDefault();
  startResize(e.touches[0].clientY);
}, { passive: false });
document.addEventListener('touchmove', e => {
  if (resizing) { e.preventDefault(); doResize(e.touches[0].clientY); }
}, { passive: false });
document.addEventListener('touchend', endResize);

// ===== FILE TREE =====

async function loadTree(dir) {
  treeScroll.innerHTML = '<div class="loading-msg">Loading...</div>';
  const url = dir ? `/api/tree?dir=${encodeURIComponent(dir)}` : '/api/tree';
  try {
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || res.statusText);
    }
    const { root, tree } = await res.json();
    state.treeRoot = root;
    localStorage.setItem('lastRoot', root);
    updatePathBar(root);
    treeScroll.innerHTML = '';
    renderTree(tree, treeScroll, 0);
    restoreLastFile();
  } catch (e) {
    treeScroll.innerHTML = `<div class="loading-msg" style="color:var(--del)">Error: ${esc(e.message)}</div>`;
  }
}

// ===== PATH BAR =====

function updatePathBar(root) {
  treePathDisplay.textContent = root;
  treePathDisplay.title = root;
  treePathInput.value = root;
}

function showPathInput() {
  treePathDisplay.style.display = 'none';
  btnTreeUp.style.display = 'none';
  treePathInput.style.display = '';
  btnPathGo.style.display = '';
  btnPathCancel.style.display = '';
  treePathInput.focus();
  treePathInput.select();
}

function hidePathInput() {
  treePathDisplay.style.display = '';
  btnTreeUp.style.display = '';
  treePathInput.style.display = 'none';
  btnPathGo.style.display = 'none';
  btnPathCancel.style.display = 'none';
}

function navigateTo(path) {
  hidePathInput();
  if (path && path.trim()) loadTree(path.trim());
}

function navigateUp() {
  if (!state.treeRoot) return;
  const parts = state.treeRoot.replace(/\/$/, '').split('/');
  if (parts.length <= 1) return;
  parts.pop();
  const parent = parts.join('/') || '/';
  loadTree(parent);
}

treePathDisplay.addEventListener('click', showPathInput);
btnTreeUp.addEventListener('click', navigateUp);
btnPathGo.addEventListener('click', () => navigateTo(treePathInput.value));
btnPathCancel.addEventListener('click', hidePathInput);
treePathInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') navigateTo(treePathInput.value);
  if (e.key === 'Escape') hidePathInput();
});

function renderTree(nodes, container, depth) {
  for (const node of nodes) {
    const wrapper = document.createElement('div');
    wrapper.className = 'tree-node';

    const item = document.createElement('div');
    item.className = 'tree-item';
    item.dataset.path = node.path;
    item.dataset.type = node.type;

    // Indentation
    const indent = document.createElement('span');
    indent.className = 'tree-indent';
    indent.style.width = (depth * 14 + 6) + 'px';
    indent.style.display = 'inline-block';

    const arrow = document.createElement('span');
    arrow.className = 'tree-arrow';

    const icon = document.createElement('span');
    icon.className = 'tree-icon';

    const name = document.createElement('span');
    name.className = 'tree-name';
    name.textContent = node.name;

    if (node.type === 'dir') {
      arrow.textContent = '▶';
      icon.textContent = '📁';
    } else {
      arrow.textContent = '';
      icon.textContent = fileIcon(node.name);
    }

    item.append(indent, arrow, icon, name);

    if (node.type === 'dir' && node.children) {
      const childContainer = document.createElement('div');
      childContainer.style.display = 'none';
      let open = false;

      item.addEventListener('click', () => {
        open = !open;
        childContainer.style.display = open ? '' : 'none';
        arrow.classList.toggle('open', open);
        icon.textContent = open ? '📂' : '📁';
      });

      renderTree(node.children, childContainer, depth + 1);
      wrapper.append(item, childContainer);
    } else {
      item.addEventListener('click', () => {
        selectFile(node.path, item);
      });
      wrapper.append(item);
    }

    container.append(wrapper);
  }
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = {
    js: '📜', ts: '📜', jsx: '📜', tsx: '📜',
    json: '📋', md: '📝', txt: '📝',
    css: '🎨', html: '🌐',
    sh: '⚙️', py: '🐍', rb: '💎', go: '🔵',
    rs: '🦀', c: '⚡', cpp: '⚡', h: '⚡',
    jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', svg: '🖼️',
    pdf: '📄', zip: '📦', gz: '📦',
  };
  return map[ext] || '📄';
}

// ===== FILE SELECTION =====

function selectFile(filePath, itemEl) {
  // Deselect previous
  document.querySelectorAll('.tree-item.selected').forEach(el => el.classList.remove('selected'));
  if (itemEl) itemEl.classList.add('selected');

  state.currentFile = filePath;
  localStorage.setItem('lastFile', filePath);

  const parts = filePath.split('/');
  breadcrumb.innerHTML = parts.slice(-2).map((p, i) =>
    i === parts.slice(-2).length - 1 ? `<span>${esc(p)}</span>` : esc(p)
  ).join(' / ');

  diffFilename.textContent = parts[parts.length - 1];

  if (isPortrait()) closeTree();

  loadFileView();
}

function restoreLastFile() {
  const last = localStorage.getItem('lastFile');
  if (!last) return;
  // Find the matching tree item
  const item = treeScroll.querySelector(`.tree-item[data-path="${CSS.escape(last)}"]`);
  // Expand parents by traversing upward (best effort — auto-open parents)
  if (item) {
    openParents(item);
    selectFile(last, item);
  }
}

function openParents(el) {
  let node = el.parentElement;
  while (node && node !== treeScroll) {
    if (node.classList && node.classList.contains('tree-node')) {
      const child = node.querySelector(':scope > div[style*="none"]');
      const parentItem = node.querySelector(':scope > .tree-item');
      if (child && parentItem) {
        child.style.display = '';
        const arrow = parentItem.querySelector('.tree-arrow');
        const icon  = parentItem.querySelector('.tree-icon');
        if (arrow) arrow.classList.add('open');
        if (icon)  icon.textContent = '📂';
      }
    }
    node = node.parentElement;
  }
}

// ===== DIFF / RAW VIEW =====

async function loadFileView() {
  diffContent.innerHTML = '<div class="loading-msg">Loading…</div>';

  if (state.viewMode === 'diff') {
    await loadDiffView();
  } else {
    await loadRawView();
  }
}

async function loadDiffView() {
  try {
    const res = await fetch(`/api/diff?file=${encodeURIComponent(state.currentFile)}`);
    if (!res.ok) throw new Error('Failed to fetch diff');
    const { diff, status, hasDiff } = await res.json();

    if (hasDiff) {
      renderDiff(diff, status);
    } else {
      // No diff — show raw with a note
      const rawRes = await fetch(`/api/read?file=${encodeURIComponent(state.currentFile)}`);
      if (!rawRes.ok) throw new Error('Could not read file');
      const text = await rawRes.text();
      const note = status ? `<div style="padding:6px 12px;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border)">No diff — status: <b style="color:var(--text)">${esc(status)}</b></div>` : '';
      diffContent.innerHTML = note + renderRawHTML(text);
    }
  } catch (e) {
    diffContent.innerHTML = `<div class="loading-msg" style="color:var(--del)">${esc(e.message)}</div>`;
  }
}

async function loadRawView() {
  try {
    const res = await fetch(`/api/read?file=${encodeURIComponent(state.currentFile)}`);
    if (res.status === 413) {
      diffContent.innerHTML = '<div class="loading-msg" style="color:var(--del)">File too large (&gt;500KB)</div>';
      return;
    }
    if (!res.ok) throw new Error('Failed to read file');
    const text = await res.text();
    diffContent.innerHTML = renderRawHTML(text);
  } catch (e) {
    diffContent.innerHTML = `<div class="loading-msg" style="color:var(--del)">${esc(e.message)}</div>`;
  }
}

function renderRawHTML(text) {
  const lines = text.split('\n');
  let html = '';
  for (let i = 0; i < lines.length; i++) {
    html += `<div class="raw-line"><span class="raw-ln">${i + 1}</span><span class="raw-code">${esc(lines[i])}</span></div>`;
  }
  return html;
}

function renderDiff(raw, status) {
  const lines = raw.split('\n');
  let html = '';
  let oldLine = 0;
  let newLine = 0;

  if (status) {
    html += `<div style="padding:4px 12px;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border)">Status: <b style="color:var(--text)">${esc(status)}</b></div>`;
  }

  for (const line of lines) {
    if (line.startsWith('@@')) {
      // Parse hunk header: @@ -old,n +new,n @@
      const m = line.match(/@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
      if (m) { oldLine = parseInt(m[1]); newLine = parseInt(m[2]); }
      html += `<div class="diff-hunk">${esc(line)}</div>`;
    } else if (line.startsWith('+') && !line.startsWith('+++')) {
      html += `<div class="diff-line add"><span class="diff-ln">${newLine++}</span><span class="diff-sign">+</span><span class="diff-code">${esc(line.slice(1))}</span></div>`;
    } else if (line.startsWith('-') && !line.startsWith('---')) {
      html += `<div class="diff-line del"><span class="diff-ln">${oldLine++}</span><span class="diff-sign">−</span><span class="diff-code">${esc(line.slice(1))}</span></div>`;
    } else if (line.startsWith(' ')) {
      html += `<div class="diff-line"><span class="diff-ln">${newLine++}${oldLine++ ? '' : ''}</span><span class="diff-sign"> </span><span class="diff-code">${esc(line.slice(1))}</span></div>`;
    } else if (line.startsWith('diff ') || line.startsWith('index ') ||
               line.startsWith('---')  || line.startsWith('+++')) {
      html += `<div class="diff-hunk">${esc(line)}</div>`;
    }
  }

  if (!html) html = '<div class="loading-msg">Empty diff</div>';
  diffContent.innerHTML = html;
}

// ===== VIEW MODE TOGGLE =====

function setViewMode(mode) {
  state.viewMode = mode;
  btnViewDiff.classList.toggle('active', mode === 'diff');
  btnViewRaw.classList.toggle('active',  mode === 'raw');
  if (state.currentFile) loadFileView();
}

btnViewDiff.addEventListener('click', () => setViewMode('diff'));
btnViewRaw.addEventListener('click',  () => setViewMode('raw'));
btnDiff.addEventListener('click', () => setViewMode(state.viewMode === 'diff' ? 'raw' : 'diff'));

// Init button states
setViewMode('diff');

// ===== TREE REFRESH =====

btnRefresh.addEventListener('click', () => loadTree(state.treeRoot || undefined));

// ===== UTILITY =====

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ===== SERVICE WORKER =====

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ===== INIT =====

// Read initial directory from URL ?dir= param, then localStorage, then server default
(function initTree() {
  const params = new URLSearchParams(location.search);
  const dirParam = params.get('dir');
  if (dirParam) {
    loadTree(dirParam);
  } else {
    const lastRoot = localStorage.getItem('lastRoot');
    loadTree(lastRoot || undefined);
  }
})();

applyLayout();

})();
</script>
</body>
</html>
